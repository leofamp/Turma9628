<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <section>
            <div >
                <p>Nome do Personagem</p>
                <input type="text">
            </div>
            <div>
                <p>Nome Jogador</p>
                <input type="text">
            </div>
            <div>
                <p>Pontos de Experiência</p>
                <input type="text">
            </div> 
            <div>
                <p>Raça</p>
                <input type="text">
            </div>
            <div>
                <p>Classe</p>
                <input type="text">
            </div>
            <div>
                <p>Alinhamento</p>
                <input type="text">
            </div>          
        </section>
    </header>
    <main>
        <section>
            <div>
                <p>FOR</p>
                <input type="text">
            </div>
            <div>
                <p>DES</p>
                <input type="text">
            </div>
            <div>
                <p>CON</p>
                <input type="text">
            </div>
            <div>
                <p>INT</p>
                <input type="text">
            </div>
            <div>
                <p>SAB</p>
                <input type="text">
            </div>
            <div>
                <p>CAR</p>
                <input type="text">
            </div>
        </section>
        <section>
            <div>
                <div>
                    <p>Vida</p>
                    <input type="text">
                </div>
                <div>
                    <p>Defesa</p>
                    <input type="text">
                </div>
                <div>
                    <p>Velocidade</p>
                    <input type="text">
                </div>
            </div>
            <div>
                <img src="" alt="">
            </div>
            <div>
                <h2>Biografia</h2>
                <textarea cols="30" rows="25"></textarea>
            </div>
        </section>
    </main>
    <footer>
        <div>
            <h2>Equipamentos</h2>
            <textarea></textarea>
        </div>
        <div>
            <h2>Características</h2>
            <textarea></textarea>
        </div>
    </footer>
    <div>
        <span><u>Prof. Leonardo</u></span>
    </div>
</body>
</html>
