<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Personagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ficha-container">
        
        <header class="header-inputs">
            <div class="input-group">
                <label>Nome personagem</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Nome jogador</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Pontos de experiência</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Raça</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Classe</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Alinhamento</label>
                <input type="text">
            </div>
        </header>

        <main class="main-content">
            
            <section class="atributos-container">
                <div class="input-group-attr">
                    <label>FOR</label>
                    <input type="text">
                </div>
                <div class="input-group-attr">
                    <label>DES</label>
                    <input type="text">
                </div>
                <div class="input-group-attr">
                    <label>CON</label>
                    <input type="text">
                </div>
                <div class="input-group-attr">
                    <label>INT</label>
                    <input type="text">
                </div>
                <div class="input-group-attr">
                    <label>SAB</label>
                    <input type="text">
                </div>
                <div class="input-group-attr">
                    <label>CAR</label>
                    <input type="text">
                </div>
            </section>

            <section class="center-container">
                <div class="status-row">
                    <div class="input-group">
                        <label>Vida</label>
                        <input type="text">
                    </div>
                    <div class="input-group">
                        <label>Defesa</label>
                        <input type="text">
                    </div>
                    <div class="input-group">
                        <label>Velocidade</label>
                        <input type="text">
                    </div>
                </div>
                
                <div class="avatar-box">
                    <img src="https://sm.ign.com/t/ign_br/screenshot/default/1f356a16-4821-4e31-9578-189d51793065-mandalorian-babyyoda-si_wr5r.1200.jpg" alt="Avatar do Personagem">
                </div>
            </section>

            <section class="biografia-container">
                <h2>Biografia</h2>
                <textarea></textarea>
            </section>

        </main>

        <footer class="footer-blocks">
            <div class="block-group">
                <h2>Equipamentos</h2>
                <textarea></textarea>
            </div>
            <div class="block-group">
                <h2>Características</h2>
                <textarea></textarea>
            </div>
        </footer>

        <div class="credits-bar">
            <span>🚀 <u>Prof. Leonardo</u></span>
        </div>
    </div>

</body>
</html>
